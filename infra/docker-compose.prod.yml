services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: sbr-api
    restart: unless-stopped
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_PORT:      3001
      API_HOST:      0.0.0.0
      NODE_ENV:      production
      JWT_SECRET:    ${JWT_SECRET}
      CORS_ORIGIN:   ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  harvester:
    build:
      context: ..
      dockerfile: packages/harvester/Dockerfile
    container_name: sbr-harvester
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SUPABASE_URL:   ${SUPABASE_URL}
      SUPABASE_KEY:   ${SUPABASE_KEY}
      SUPABASE_SCHEMA: ${SUPABASE_SCHEMA:-lab_sobral}
      HARVEST_CRON:   ${HARVEST_CRON:-*/30 * * * *}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: sbr-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - api
    networks:
      - internal

volumes:
  postgres-data:

networks:
  internal:
    driver: bridge
