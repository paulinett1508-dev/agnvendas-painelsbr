# Bloco para o Painel SBR
# Adicionar em /etc/nginx/sites-available/painel-sbr
# e fazer symlink: ln -s /etc/nginx/sites-available/painel-sbr /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name painel.laboratoriosobral.com.br;   # ← ajustar domínio

    # Redireciona para HTTPS (descomente após configurar SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

